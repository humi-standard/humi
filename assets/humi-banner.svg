<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32"/>
      <stop offset="33%" style="stop-color:#1565C0"/>
      <stop offset="66%" style="stop-color:#00838F"/>
      <stop offset="100%" style="stop-color:#607D8B"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="150" rx="12" fill="url(#bg)"/>
  
  <!-- HUMI text -->
  <text x="300" y="70" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="700" fill="white" letter-spacing="4">HUMI</text>
  
  <!-- Subtitle -->
  <text x="300" y="105" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.85)" letter-spacing="1">Human Index</text>
  
  <!-- Version badge -->
  <rect x="255" y="115" width="90" height="22" rx="11" fill="rgba(255,255,255,0.15)"/>
  <text x="300" y="130" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.9)">Open Standard</text>
</svg>
